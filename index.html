<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatFlow</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #25D366;
            --dark: #1F2937;
            --gray: #F5F5F5;
            --border: #E5E7EB;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: var(--dark);
        }

        /* ========== LOGIN ========== */
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, #1fb857 100%);
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #1fb857;
        }

        .error {
            color: #EF4444;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }

        .error.show {
            display: block;
        }

        /* ========== CHAT ========== */
        .chat-container {
            display: none;
            height: 100vh;
            flex-direction: row;
        }

        .chat-container.active {
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: var(--gray);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .user-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .user-header p {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .logout-btn {
            background: #EF4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }

        .conversation {
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .conversation:hover {
            background: var(--primary);
            color: white;
        }

        .conversation.active {
            background: var(--primary);
            color: white;
            border-color: #1fb857;
        }

        .conversation-name {
            font-weight: 600;
            font-size: 14px;
        }

        .conversation-preview {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* MAIN CHAT */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            background: var(--gray);
        }

        .chat-header h2 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 12px;
            color: #666;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            padding: 10px 14px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.own .message-bubble {
            background: var(--primary);
            color: white;
            border-radius: 12px 4px 12px 12px;
        }

        .message.other .message-bubble {
            background: var(--gray);
            color: var(--dark);
            border-radius: 4px 12px 12px 12px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            margin-left: 8px;
        }

        .message.own .message-time {
            color: #ccc;
            text-align: right;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            flex-direction: column;
            gap: 10px;
        }

        .empty-state-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        /* INPUT */
        .input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: white;
            display: flex;
            gap: 8px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 14px;
            font-family: inherit;
        }

        .input-area input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: #1fb857;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>ChatFlow</h1>
            <form id="authForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Mot de passe" required>
                </div>
                <button type="submit" class="login-btn">Entrer</button>
                <div class="error" id="errorMsg"></div>
            </form>
        </div>
    </div>

    <!-- CHAT -->
    <div class="chat-container" id="chatContainer">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="user-header">
                <p id="currentUserName"></p>
                <button class="logout-btn" id="logoutBtn">Déconnexion</button>
            </div>

            <div class="conversations-list" id="conversationsList"></div>
        </div>

        <!-- MAIN CHAT -->
        <div class="main-chat">
            <div class="chat-header">
                <h2 id="chatName"></h2>
                <p id="chatStatus">en ligne</p>
            </div>

            <div class="messages" id="messages"></div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Message...">
                <button class="send-btn" id="sendBtn">📤</button>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'http://localhost:3000';
        let socket = null;
        let token = null;
        let currentUserId = null;
        let currentConversation = null;

        // ========== AUTH ==========
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');
            
            errorEl.classList.remove('show');
            
            try {
                const response = await fetch(`${SERVER_URL}/api/auth/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Erreur');
                }

                const data = await response.json();
                token = data.token;
                currentUserId = data.user.id;
                
                localStorage.setItem('token', token);
                localStorage.setItem('userId', currentUserId);
                
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('chatContainer').classList.add('active');
                document.getElementById('currentUserName').textContent = data.user.name;
                
                initSocket();
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.classList.add('show');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('userId');
            if (socket) socket.disconnect();
            location.reload();
        });

        // ========== SOCKET ==========
        function initSocket() {
            socket = io(SERVER_URL, { auth: { token } });

            socket.on('connect', () => {
                loadConversations();
            });

            socket.on('message:new', (msg) => {
                if (msg.conversation === currentConversation?.id) {
                    addMessageToUI(msg);
                }
            });

            socket.on('disconnect', () => {
                console.log('Disconnected');
            });
        }

        // ========== CONVERSATIONS ==========
        function loadConversations() {
            socket.emit('conversations:list', (response) => {
                if (response.success) {
                    const list = document.getElementById('conversationsList');
                    list.innerHTML = response.conversations.map(conv => `
                        <div class="conversation" onclick="selectConversation('${conv._id}', '${conv.participants[0].name}')">
                            <div class="conversation-name">${conv.participants[0].name}</div>
                            <div class="conversation-preview">${conv.lastMessage?.content || 'Pas de message'}</div>
                        </div>
                    `).join('');
                }
            });
        }

        function selectConversation(convId, userName) {
            currentConversation = { id: convId };
            
            document.querySelectorAll('.conversation').forEach(el => el.classList.remove('active'));
            event.target.closest('.conversation').classList.add('active');
            
            document.getElementById('chatName').textContent = userName;
            document.getElementById('messages').innerHTML = '';
            
            socket.emit('messages:list', convId, (response) => {
                if (response.success) {
                    response.messages.forEach(msg => addMessageToUI(msg));
                }
            });
        }

        // ========== MESSAGES ==========
        function addMessageToUI(msg) {
            const container = document.getElementById('messages');
            const isOwn = msg.sender.id === currentUserId;
            
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            div.innerHTML = `
                <div>
                    <div class="message-bubble">${msg.content}</div>
                    <div class="message-time">${new Date(msg.createdAt).toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'})}</div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendMessage() {
            const text = document.getElementById('messageInput').value.trim();
            if (!text || !currentConversation) return;

            socket.emit('message:send', {
                conversationId: currentConversation.id,
                content: text,
                messageType: 'text'
            }, (response) => {
                if (response.success) {
                    document.getElementById('messageInput').value = '';
                }
            });
        }

        // ========== INIT ==========
        window.addEventListener('load', () => {
            const savedToken = localStorage.getItem('token');
            if (savedToken) {
                token = savedToken;
                currentUserId = localStorage.getItem('userId');
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('chatContainer').classList.add('active');
                initSocket();
            }
        });
    </script>
</body>
</html>
